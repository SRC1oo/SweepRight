# SweepRight Cleaning — Cloudflare Worker Configuration
# This file is kept in sync with wrangler.jsonc.
# Both files are present; wrangler.jsonc takes precedence in newer Wrangler
# versions, but this file is kept correct as a fallback for CI environments.

name = "sweepright"
main = "src/worker.js"
compatibility_date = "2026-04-01"

# Static assets served from /public only — keeps node_modules out of upload
[assets]
directory = "./public"
binding = "ASSETS"

# Non-secret environment variables
[vars]
SITE_URL       = "https://sweeprightcleaning.com"
INTERNAL_EMAIL = "cleaners@sweeprightcleaning.com"
EMAIL_FROM     = "SweepRight <bookings@sweeprightcleaning.com>"
EMAIL_API_URL  = "https://api.resend.com/emails"

# Secrets — add via Dashboard or: npx wrangler secret put <NAME>
# Required: STRIPE_SECRET_KEY, EMAIL_API_KEY
# Optional: STRIPE_WEBHOOK_SECRET

# Optional KV namespace for booking storage:
# [[kv_namespaces]]
# binding = "BOOKINGS_KV"
# id = "YOUR_KV_NAMESPACE_ID"
