# SweepRight — Cloudflare Pages Configuration
# Deploy: npx wrangler pages deploy . --project-name=sweepright

name = "sweepright"
compatibility_date = "2024-01-01"

# Environment variables (set via Cloudflare Dashboard → Settings → Environment Variables)
# Required:
#   STRIPE_SECRET_KEY       - Stripe secret key
#   STRIPE_PUBLISHABLE_KEY  - Stripe publishable key
#   STRIPE_WEBHOOK_SECRET   - Stripe webhook signing secret
#   SITE_URL                - e.g. https://sweeprightcleaning.com
#   EMAIL_API_KEY           - Email service API key (Resend recommended)
#   EMAIL_API_URL           - e.g. https://api.resend.com/emails
#   EMAIL_FROM              - e.g. SweepRight <bookings@sweeprightcleaning.com>
#   INTERNAL_EMAIL          - e.g. cleaners@sweeprightcleaning.com

# Optional KV namespace for booking storage:
# [[kv_namespaces]]
# binding = "BOOKINGS_KV"
# id = "your-kv-namespace-id"
